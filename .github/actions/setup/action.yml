# Shared setup for every CI/deploy job: pnpm, Node, and dependencies.
# Run actions/checkout in the job first — a local action needs the repo present.
name: Setup
description: Install pnpm, Node 22, and project dependencies (frozen lockfile).
runs:
  using: composite
  steps:
    # Actions are pinned to a full commit SHA (supply-chain hardening), each on a
    # version that has been out for well over a week; the trailing tag is the
    # human-readable version. Bump these deliberately, never auto-update.
    - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8 (the pnpm binary version still comes from package.json packageManager)
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
