name: CI

# The quality gate on every push to main and every pull request. The repo is
# public, so GitHub-hosted runners are free with no minutes cap. The two jobs
# run in parallel: `check` (typecheck, lint, stylelint, format, unit tests) and
# `e2e` (build + Playwright). CI never publishes; deploying is separate and
# on-demand only (deploy.yml), which runs the same two jobs as its gate.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# One run per ref; a newer push cancels the in-flight one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # checkout is pinned to a SHA; the rest of the setup lives in the shared
      # composite action (.github/actions/setup), where the pin policy is noted.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      # typecheck + eslint + stylelint + prettier + unit tests (Vitest)
      - run: pnpm run check

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      # build, install the Chrome the config pins, then run Playwright.
      # playwright.config.ts's webServer serves the build and tears it down.
      - run: pnpm run build
      - run: pnpm exec playwright install --with-deps chrome
      - run: pnpm run test:e2e
