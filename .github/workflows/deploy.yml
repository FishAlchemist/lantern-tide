name: Deploy to GitHub Pages

on:
  # Deploy on demand only: push a version tag (e.g. v1.0.0) when you're ready to
  # publish, or run this workflow manually from the Actions tab. Plain pushes to
  # main run CI (.github/workflows/ci.yml) but never deploy.
  push:
    tags: ["v*"]
  workflow_dispatch:

# Let the deploy job publish to Pages over OIDC; everything else read-only.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel a run that a newer push supersedes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # The same quality gate CI runs, re-run here on the tagged commit — so only a
  # commit whose check + e2e pass can be published.
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to a full commit SHA (supply-chain hardening), each on
      # a version that has been out for well over a week; the trailing tag is the
      # human-readable version. Bump these deliberately, never auto-update.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0 (the pnpm binary version still comes from package.json packageManager)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:pages # sets base to /lantern-tide/ and emits 404.html
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
