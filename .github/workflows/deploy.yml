name: Deploy to GitHub Pages

on:
  # Deploy on demand only: push a version tag (e.g. v0.1.0) when you're ready to
  # publish, or run this workflow manually from the Actions tab. Plain pushes to
  # main run CI (.github/workflows/ci.yml) but never deploy.
  push:
    tags: ["v*"]
  workflow_dispatch:

# Let the deploy job publish to Pages over OIDC; everything else read-only.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel a run that a newer push supersedes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # The same gate CI runs, re-run here on the tagged commit: `check` and `e2e`
  # in parallel. `build` only starts once both pass, so only a commit whose gate
  # is green can be published.
  check:
    runs-on: ubuntu-latest
    steps:
      # checkout is pinned to a SHA; the rest of the setup lives in the shared
      # composite action (.github/actions/setup), where the pin policy is noted.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup
      - run: pnpm run check

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup
      - run: pnpm run build
      - run: pnpm exec playwright install --with-deps chrome
      - run: pnpm run test:e2e

  build:
    needs: [check, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup
      - run: pnpm run build:pages # sets base to /lantern-tide/ and emits 404.html
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
